[build]
  base = "web"
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  # O SDK Web do Firebase incorpora NEXT_PUBLIC_FIREBASE_API_KEY no bundle do cliente.
  # Essa chave é pública por design (restrições ficam no console Firebase); o scan
  # heurístico da Netlify acusa "AIza..." como segredo no output do build.
  SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[[plugins]]
  package = "@netlify/plugin-nextjs"
